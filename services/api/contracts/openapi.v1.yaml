openapi: 3.1.0
info:
  title: Tailor Moments V1 API
  version: 0.1.0
  description: REST contract for the Tailor Moments frictionless booking prototype.
servers:
  - url: https://api.tailormoments.example.com/api/v1
paths:
  /itinerary/recommend:
    post:
      summary: Recommend ranked itineraries for a booking request
      operationId: recommendItinerary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendItineraryRequest'
      responses:
        '200':
          description: Ranked itinerary options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendItineraryResponse'
  /action-tokens/{tokenId}/approve:
    post:
      summary: Approve a winery booking using a magic link token
      operationId: approveBookingByToken
      parameters:
        - in: path
          name: tokenId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Booking approved
  /action-tokens/{tokenId}/accept:
    post:
      summary: Accept a transport job using a magic link token
      operationId: acceptTransportByToken
      parameters:
        - in: path
          name: tokenId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transport job accepted
components:
  schemas:
    RecommendItineraryRequest:
      type: object
      required:
        - booking_date
        - party_size
        - pickup_location
      properties:
        booking_date:
          type: string
          format: date
        party_size:
          type: integer
          minimum: 1
        pickup_location:
          type: string
        preferred_wineries:
          type: array
          items:
            type: string
            format: uuid
        preferred_region:
          type: string
    RecommendItineraryResponse:
      type: object
      required:
        - generated_at
        - itineraries
      properties:
        generated_at:
          type: string
          format: date-time
        itineraries:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ItineraryOption'
    ItineraryOption:
      type: object
      required:
        - itinerary_id
        - expert_pick
        - justification
        - score
        - stops
      properties:
        itinerary_id:
          type: string
          format: uuid
        expert_pick:
          type: boolean
        justification:
          type: string
          minLength: 1
        score:
          type: number
        stops:
          type: array
          items:
            $ref: '#/components/schemas/ItineraryStop'
    ItineraryStop:
      type: object
      required:
        - winery_id
        - winery_name
        - arrival_time
        - departure_time
      properties:
        winery_id:
          type: string
          format: uuid
        winery_name:
          type: string
        arrival_time:
          type: string
          format: date-time
        departure_time:
          type: string
          format: date-time
